<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>QR Code Generator</h1>
      <p class="subtitle">Generate QR codes instantly in your browser</p>
    </header>

    <main>
      <section class="input-section">
        <label for="text-input">Text or URL</label>
        <textarea
          id="text-input"
          placeholder="Enter text or URL..."
          rows="3"
          maxlength="2000"
        ></textarea>
        <span id="char-count">0 / 2000</span>
        <p id="error-message" class="error" aria-live="polite"></p>
      </section>

      <section class="options-section">
        <div class="option-group">
          <label for="qr-size">Size</label>
          <select id="qr-size">
            <option value="150">Small — 150px</option>
            <option value="200" selected>Medium — 200px</option>
            <option value="300">Large — 300px</option>
          </select>
        </div>

        <div class="option-group">
          <label for="qr-fg">QR Color</label>
          <div class="color-input-wrap">
            <input type="color" id="qr-fg" value="#1a1a2e">
            <span id="fg-hex">#1a1a2e</span>
          </div>
        </div>

        <div class="option-group">
          <label for="qr-bg">Background</label>
          <div class="color-input-wrap">
            <input type="color" id="qr-bg" value="#ffffff">
            <span id="bg-hex">#ffffff</span>
          </div>
        </div>
      </section>

      <button id="generate-btn" class="btn btn-primary">Generate QR Code</button>

      <section id="result-section" class="result-section hidden">
        <div id="qr-output" class="qr-output"></div>
        <button id="download-btn" class="btn btn-secondary">Download PNG</button>
      </section>
    </main>

    <footer>
      <p>All processing happens locally in your browser.</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
